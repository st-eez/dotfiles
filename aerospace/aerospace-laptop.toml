# Enable normalizations for BSP-like behavior (like yabai)
# This makes windows automatically tile side-by-side similar to yabai's BSP layout
start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Default layout for new windows (tiles = BSP-like tiling)
default-root-container-layout = 'tiles'

# Mouse follows focus (like yabai mouse_follows_focus)
# on-focus-changed = ['move-mouse window-lazy-center']

# Automatically change accordion to tiles when only one window
accordion-padding = 30

after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = [
    # JankyBorders has a built-in detection of already running process,
    # so it won't be run twice on AeroSpace restart
    'exec-and-forget /opt/homebrew/opt/sketchybar/bin/sketchybar',
    # 'exec-and-forget /opt/homebrew/opt/borders/bin/borders active_color="glow(0xd943ff64)" inactive_color=0x20494d64 width=8.0'
]

exec-on-workspace-change = [
    '/bin/bash',
    '-c',
    '/opt/homebrew/opt/sketchybar/bin/sketchybar --trigger aerospace_workspace_change AEROSPACE_FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE AEROSPACE_PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE',
]

[gaps]
inner.horizontal = 8
inner.vertical =   8
outer.left =       8
outer.bottom =     8
outer.top =        [{ monitor."built-in" = 12 }, 8]  # 12px for MacBook, 8px for externals
outer.right =      8

# Laptop-only setup - All workspaces on Built-in display
[workspace-to-monitor-force-assignment]
1 = 'built-in'          # All 9 workspaces on MacBook display
2 = 'built-in'
3 = 'built-in'
4 = 'built-in'
5 = 'built-in'
6 = 'built-in'
7 = 'built-in'
8 = 'built-in'
9 = 'built-in'

[mode.main.binding]
    # Window focus (Omarchy-style: Super+arrows → Ctrl+arrows)
    ctrl-left  = 'exec-and-forget aerospace focus left --boundaries-action fail || aerospace focus-monitor left'
    ctrl-right = 'exec-and-forget aerospace focus right --boundaries-action fail || aerospace focus-monitor right'
    ctrl-up    = 'exec-and-forget aerospace focus up --boundaries-action fail || aerospace focus-monitor up'
    ctrl-down  = 'exec-and-forget aerospace focus down --boundaries-action fail || aerospace focus-monitor down'

    # Swap windows (Omarchy-style: Super+Shift+arrows → Ctrl+Shift+arrows)
    ctrl-shift-left  = 'exec-and-forget bash -c "aerospace move left && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-shift-right = 'exec-and-forget bash -c "aerospace move right && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-shift-up    = 'exec-and-forget bash -c "aerospace move up && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-shift-down  = 'exec-and-forget bash -c "aerospace move down && sleep 0.05 && aerospace move-mouse window-lazy-center"'

    # Jump to workspace (Omarchy-style: Super+1-9 → Ctrl+1-9)
    ctrl-1 = 'exec-and-forget bash -c "aerospace workspace 1 && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-2 = 'exec-and-forget bash -c "aerospace workspace 2 && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-3 = 'exec-and-forget bash -c "aerospace workspace 3 && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-4 = 'exec-and-forget bash -c "aerospace workspace 4 && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-5 = 'exec-and-forget bash -c "aerospace workspace 5 && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-6 = 'exec-and-forget bash -c "aerospace workspace 6 && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-7 = 'exec-and-forget bash -c "aerospace workspace 7 && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-8 = 'exec-and-forget bash -c "aerospace workspace 8 && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-9 = 'exec-and-forget bash -c "aerospace workspace 9 && sleep 0.05 && aerospace move-mouse window-lazy-center"'

    # Move window to workspace and follow (Omarchy-style: Super+Shift+1-9 → Ctrl+Shift+1-9)
    ctrl-shift-1 = 'exec-and-forget bash -c "aerospace move-node-to-workspace --focus-follows-window 1 && aerospace workspace 1 && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-shift-2 = 'exec-and-forget bash -c "aerospace move-node-to-workspace --focus-follows-window 2 && aerospace workspace 2 && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-shift-3 = 'exec-and-forget bash -c "aerospace move-node-to-workspace --focus-follows-window 3 && aerospace workspace 3 && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-shift-4 = 'exec-and-forget bash -c "aerospace move-node-to-workspace --focus-follows-window 4 && aerospace workspace 4 && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-shift-5 = 'exec-and-forget bash -c "aerospace move-node-to-workspace --focus-follows-window 5 && aerospace workspace 5 && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-shift-6 = 'exec-and-forget bash -c "aerospace move-node-to-workspace --focus-follows-window 6 && aerospace workspace 6 && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-shift-7 = 'exec-and-forget bash -c "aerospace move-node-to-workspace --focus-follows-window 7 && aerospace workspace 7 && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-shift-8 = 'exec-and-forget bash -c "aerospace move-node-to-workspace --focus-follows-window 8 && aerospace workspace 8 && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-shift-9 = 'exec-and-forget bash -c "aerospace move-node-to-workspace --focus-follows-window 9 && aerospace workspace 9 && sleep 0.05 && aerospace move-mouse window-lazy-center"'

    # Move window to workspace without following (Custom binding: Ctrl+Shift+Alt+1-9)
    ctrl-shift-alt-1 = 'move-node-to-workspace 1'
    ctrl-shift-alt-2 = 'move-node-to-workspace 2'
    ctrl-shift-alt-3 = 'move-node-to-workspace 3'
    ctrl-shift-alt-4 = 'move-node-to-workspace 4'
    ctrl-shift-alt-5 = 'move-node-to-workspace 5'
    ctrl-shift-alt-6 = 'move-node-to-workspace 6'
    ctrl-shift-alt-7 = 'move-node-to-workspace 7'
    ctrl-shift-alt-8 = 'move-node-to-workspace 8'
    ctrl-shift-alt-9 = 'move-node-to-workspace 9'

    # Workspace cycling (Omarchy-style: Super+Tab/Shift+Tab → Ctrl+Tab/Shift+Tab)
    ctrl-tab = 'exec-and-forget bash -c "aerospace workspace --wrap-around next && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-shift-tab = 'exec-and-forget bash -c "aerospace workspace --wrap-around prev && sleep 0.05 && aerospace move-mouse window-lazy-center"'

    # Workspace back-and-forth (Omarchy-style: Super+Ctrl+Tab → Ctrl+Alt+Tab)
    ctrl-alt-tab = 'exec-and-forget bash -c "aerospace workspace-back-and-forth && sleep 0.05 && aerospace move-mouse window-lazy-center"'

    # Window controls (Omarchy-style)
    ctrl-t = 'layout floating tiling'  # Super+T → Ctrl+T
    ctrl-f = 'fullscreen'  # Super+F → Ctrl+F
    ctrl-j = 'layout tiles horizontal vertical'  # Super+J → Ctrl+J

    # Resize (Omarchy-style: Super+Equal/Minus → Ctrl+Equal/Minus)
    ctrl-equal = 'resize smart +100'
    ctrl-minus = 'resize smart -100'
    ctrl-shift-equal = 'resize smart +50'
    ctrl-shift-minus = 'resize smart -50'

    # Layout management (Custom bindings kept)
    ctrl-alt-0 = 'flatten-workspace-tree'
    ctrl-alt-shift-left  = 'join-with left'
    ctrl-alt-shift-right = 'join-with right'
    ctrl-alt-shift-up    = 'join-with up'
    ctrl-alt-shift-down  = 'join-with down'

    # Move window to different monitor (Custom bindings kept)
    ctrl-alt-cmd-left  = 'exec-and-forget bash -c "aerospace move-node-to-monitor --wrap-around --focus-follows-window prev && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-alt-cmd-right = 'exec-and-forget bash -c "aerospace move-node-to-monitor --wrap-around --focus-follows-window next && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-alt-cmd-up    = 'exec-and-forget bash -c "aerospace move-node-to-monitor --wrap-around --focus-follows-window up && sleep 0.05 && aerospace move-mouse window-lazy-center"'
    ctrl-alt-cmd-down  = 'exec-and-forget bash -c "aerospace move-node-to-monitor --wrap-around --focus-follows-window down && sleep 0.05 && aerospace move-mouse window-lazy-center"'

    # Move window to specific monitor by number (Custom bindings kept)
    ctrl-alt-1 = 'move-node-to-monitor 1'
    ctrl-alt-2 = 'move-node-to-monitor 2'
    ctrl-alt-3 = 'move-node-to-monitor 3'

    # Configuration management (Custom bindings kept)
    alt-shift-f = 'macos-native-fullscreen'
    alt-shift-c = 'reload-config'
    alt-shift-h = 'exec-and-forget /bin/bash -c "cp ~/.config/aerospace/aerospace-home.toml ~/.config/aerospace/aerospace.toml && aerospace reload-config && sketchybar --reload"'
    alt-shift-w = 'exec-and-forget /bin/bash -c "cp ~/.config/aerospace/aerospace-office.toml ~/.config/aerospace/aerospace.toml && aerospace reload-config && sketchybar --reload"'
    alt-shift-l = 'exec-and-forget /bin/bash -c "cp ~/.config/aerospace/aerospace-laptop.toml ~/.config/aerospace/aerospace.toml && aerospace reload-config && sketchybar --reload"'
    alt-shift-m = 'exec-and-forget /bin/bash /Users/stevedimakos/.config/sketchybar/toggle_topmost.sh'

