# True color support
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"

# Start windows and panes at 1, renumber on close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Prefix: Ctrl tap (Karabiner sends Ctrl+Space) with Ctrl+b as fallback
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# Scrollback buffer (default 2000 is too small for Claude Code sessions)
set -g history-limit 50000

# No escape delay (faster neovim mode switching)
set -sg escape-time 0

# New windows/splits open in current directory
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf

# Let programs detect pane focus changes
set -g focus-events on

# Allow escape sequences to pass through to Ghostty
set -g allow-passthrough on

# Mouse support
set -g mouse on

# Auto-rebalance panes evenly when one closes
set-hook -g pane-exited      'select-layout -E'
set-hook -g after-kill-pane   'select-layout -E'

# Sticky spawner-scoped agent attention: entering a window retires every
# attention record whose spawner_pane lives inside it (steez-ht6x).
# after-select-window covers in-session window switches; client-session-changed
# covers cross-session `switch-client -t <session>`, which does not fire
# after-select-window. The helper lives out-of-line because tmux format
# expansion in run-shell consumes `$var`, which would empty any inline
# while/read loop.
set-hook -g after-select-window 'run-shell -b "~/.config/tmux/hooks/ack-spawner-attention.sh \"#{window_id}\""'
set-hook -g client-session-changed 'run-shell -b "~/.config/tmux/hooks/ack-spawner-attention.sh \"#{window_id}\""'

# Status bar settings
set -g status-position top
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100

# Window auto-naming: show directory by default, prefix+, to override
set -g automatic-rename on
set -g automatic-rename-format "/#{b:pane_current_path}"

# Catppuccin base (theme.conf overrides colors; plugin provides @thm_* infrastructure)
set -g @catppuccin_flavor "mocha"

# Source theme (symlinked by theme-set, sets @thm_* color overrides)
source-file ~/.config/tmux/theme.conf

# Keep tmux split borders aligned with jankyborders active/inactive colors.
set -g @catppuccin_pane_border_style "fg=#{@thm_surface_0}"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_fg}"

# Show pane number on border to indicate active pane
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#{@thm_teal} bold] #{window_index}.#{pane_index} ,#[fg=#{@thm_overlay_0}] #{window_index}.#{pane_index} }#[default]"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

# ── Custom status bar (Monoline) ─────────────────────────────────────────────
# Pure typography — no pills, no backgrounds, no decorative elements.
# Thin pipe characters create rhythm and structure.
# Active window distinguished by color weight and brightness alone.
# Pipes embedded per-window to avoid tmux separator style contamination.

# Bar background
set -g status-style "bg=#{@thm_crust},fg=#{@thm_fg}"

# Left: prefix accents the existing session brackets.
set -g status-left "#[fg=#{@thm_fg}] ⚡ #{?client_prefix,#[fg=#{@thm_teal} bold],#[fg=#{@thm_overlay_2}]}[ #[fg=#{@thm_fg} bold]#S #{?client_prefix,#[fg=#{@thm_teal} bold],#[fg=#{@thm_overlay_2} nobold]}]#[default]"

# Override Catppuccin's alert styles — the plugin sets bg colors that
# break monoline in monochrome themes (lavender/yellow → same gray as text).
# Monoline indicates alerts through foreground brightness, not background blocks.
set -g window-status-activity-style "default"
set -g window-status-bell-style "default"

# Pipes embedded in each window format for guaranteed uniform color.
# No window-status-separator — each format owns its leading pipe.
set -g window-status-separator ""
set -g window-status-format " #{?client_prefix,#[fg=#{@thm_teal} bold],#[fg=#{@thm_surface_1}]}│ #[fg=#{@thm_overlay_2}]#I#[fg=#{@thm_overlay_0} nobold] #W#{?@agent_monitor_attention, #[fg=#{@thm_teal} bold]●,}#[default]"
set -g window-status-current-format " #{?client_prefix,#[fg=#{@thm_teal} bold],#[fg=#{@thm_surface_1}]}│ #{?client_prefix,#[fg=#{@thm_teal} bold]#I #W#{?@agent_monitor_attention, ●,},#[fg=#{@thm_teal} bold]#I #[fg=#{@thm_fg}]#W#{?@agent_monitor_attention, #[fg=#{@thm_teal} bold]●,}#[nobold]}#[default]"

# Right: memory pressure (dark cockpit) + git branch + running command
set -g status-right " #(~/.local/bin/mem-pressure) #{?client_prefix,#[fg=#{@thm_teal} bold],#[fg=#{@thm_surface_1}]}│ #[fg=#{@thm_green}] #(cd '#{pane_current_path}' && git rev-parse --abbrev-ref HEAD 2>/dev/null) #{?client_prefix,#[fg=#{@thm_teal} bold],#[fg=#{@thm_surface_1}]}│ #[fg=#{@thm_teal}] #[fg=#{@thm_overlay_0}]#{=30:pane_title} #[default]"
