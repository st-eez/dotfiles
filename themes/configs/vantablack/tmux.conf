# Vantablack theme - Catppuccin color overrides
# Managed by theme-set - do not edit manually

# Base
set -g @thm_bg "#1a1a1a"
set -g @thm_fg "#ffffff"
set -g @thm_crust "#0d0d0d"
set -g @thm_mantle "#0d0d0d"

# Surfaces
set -g @thm_surface_0 "#2a2a2a"
set -g @thm_surface_1 "#2a2a2a"
set -g @thm_surface_2 "#8d8d8d"

# Overlays
set -g @thm_overlay_0 "#8d8d8d"
set -g @thm_overlay_1 "#8d8d8d"
set -g @thm_overlay_2 "#8d8d8d"

# Text
set -g @thm_subtext_0 "#ffffff"
set -g @thm_subtext_1 "#ffffff"

# Accents
set -g @thm_red "#a4a4a4"
set -g @thm_maroon "#cecece"
set -g @thm_peach "#cecece"
set -g @thm_yellow "#cecece"
set -g @thm_green "#b6b6b6"
set -g @thm_teal "#b0b0b0"
set -g @thm_sky "#8d8d8d"
set -g @thm_sapphire "#b0b0b0"
set -g @thm_blue "#8d8d8d"
set -g @thm_lavender "#9b9b9b"
set -g @thm_mauve "#9b9b9b"
set -g @thm_pink "#a4a4a4"
set -g @thm_flamingo "#a4a4a4"
set -g @thm_rosewater "#ffffff"

# Window overrides
set -g @catppuccin_window_current_number_color "#{@thm_teal}"
set -g @catppuccin_window_number_color "#{@thm_overlay_2}"

# Status module overrides (bypasses plugin -o caching on reload)
set -g @catppuccin_session_color "#{?client_prefix,#{E:@thm_mauve},#{E:@thm_green}}"
set -g @catppuccin_status_application_icon_bg "#8d8d8d"
set -g @catppuccin_status_uptime_icon_bg "#cecece"

# Pane borders
set -g pane-border-style "fg=#8d8d8d"
set -g pane-active-border-style "fg=#b6b6b6"
