# Vantarouge theme - Catppuccin color overrides
# Managed by theme-set - do not edit manually

# Base
set -g @thm_bg "#1a1a1a"
set -g @thm_fg "#eaeaea"
set -g @thm_crust "#0d0d0d"
set -g @thm_mantle "#0d0d0d"

# Surfaces
set -g @thm_surface_0 "#2a2a2a"
set -g @thm_surface_1 "#343434"
set -g @thm_surface_2 "#8a8a8a"

# Overlays
set -g @thm_overlay_0 "#8a8a8a"
set -g @thm_overlay_1 "#8a8a8a"
set -g @thm_overlay_2 "#666666"

# Text
set -g @thm_subtext_0 "#eaeaea"
set -g @thm_subtext_1 "#eaeaea"

# Accents
set -g @thm_red "#c94f4f"
set -g @thm_maroon "#aa7462"
set -g @thm_peach "#aa7462"
set -g @thm_yellow "#ad9168"
set -g @thm_green "#eaeaea"
set -g @thm_teal "#c94f4f"
set -g @thm_sky "#858fa8"
set -g @thm_sapphire "#809996"
set -g @thm_blue "#858fa8"
set -g @thm_lavender "#9f748d"
set -g @thm_mauve "#9f748d"
set -g @thm_pink "#c94f4f"
set -g @thm_flamingo "#c94f4f"
set -g @thm_rosewater "#eaeaea"

# Window overrides
set -g @catppuccin_window_current_number_color "#{@thm_teal}"
set -g @catppuccin_window_number_color "#{@thm_overlay_2}"

# Status module overrides (bypasses plugin -o caching on reload)
set -g @catppuccin_session_color "#{?client_prefix,#{E:@thm_mauve},#{E:@thm_green}}"
set -g @catppuccin_status_application_icon_bg "#c94f4f"
set -g @catppuccin_status_uptime_icon_bg "#ad9168"

# Pane borders
set -g pane-border-style "fg=#666666"
set -g pane-active-border-style "fg=#c94f4f"
