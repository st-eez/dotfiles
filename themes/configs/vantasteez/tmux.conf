# Vantasteez theme - Catppuccin color overrides
# Managed by theme-set - do not edit manually

# Base
set -g @thm_bg "#1a1a1a"
set -g @thm_fg "#f2f2f2"
set -g @thm_crust "#0d0d0d"
set -g @thm_mantle "#0d0d0d"

# Surfaces
set -g @thm_surface_0 "#2a2a2a"
set -g @thm_surface_1 "#2a2a2a"
set -g @thm_surface_2 "#8d8d8d"

# Overlays
set -g @thm_overlay_0 "#8d8d8d"
set -g @thm_overlay_1 "#8d8d8d"
set -g @thm_overlay_2 "#8d8d8d"

# Text
set -g @thm_subtext_0 "#f2f2f2"
set -g @thm_subtext_1 "#f2f2f2"

# Accents
set -g @thm_red "#d68392"
set -g @thm_maroon "#dc9d77"
set -g @thm_peach "#dc9d77"
set -g @thm_yellow "#c8a87a"
set -g @thm_green "#9dbc7b"
set -g @thm_teal "#87bcdc"
set -g @thm_sky "#859fd6"
set -g @thm_sapphire "#87bcdc"
set -g @thm_blue "#859fd6"
set -g @thm_lavender "#af9ad6"
set -g @thm_mauve "#af9ad6"
set -g @thm_pink "#d68392"
set -g @thm_flamingo "#d68392"
set -g @thm_rosewater "#f2f2f2"

# Window overrides
set -g @catppuccin_window_current_number_color "#{@thm_teal}"
set -g @catppuccin_window_number_color "#{@thm_overlay_2}"

# Status module overrides (bypasses plugin -o caching on reload)
set -g @catppuccin_session_color "#{?client_prefix,#{E:@thm_mauve},#{E:@thm_green}}"
set -g @catppuccin_status_application_icon_bg "#859fd6"
set -g @catppuccin_status_uptime_icon_bg "#c8a87a"

# Pane borders
set -g pane-border-style "fg=#8d8d8d"
set -g pane-active-border-style "fg=#9dbc7b"
