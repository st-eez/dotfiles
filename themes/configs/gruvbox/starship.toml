# Gruvbox Starship theme
# Managed by theme-set - do not edit manually
add_newline = true
command_timeout = 200
format = "$os$hostname[$directory$git_branch$git_status]($style)$character"

[os]
disabled = false
style = "#ebdbb2"

[os.symbols]
Macos = "󰀵 "
Arch = "󰣇 "
Ubuntu = " "
Mint = "󰣭 "
Linux = " "

[hostname]
ssh_only = true
format = "[$hostname](#ebdbb2):"

[character]
error_symbol = "[✘](bold #fb4934)"
success_symbol = "[❯](bold #ebdbb2)"

[directory]
truncation_length = 3
truncation_symbol = "…/"
style = "#ebdbb2"
before_repo_root_style = "#ebdbb2"
repo_root_style = "bold #8ec07c"
repo_root_format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "#b8bb26"

[git_status]
format = '$all_status$ahead_behind'
ahead = "[⇡${count}](#b8bb26) "
diverged = "[⇕⇡${ahead_count}⇣${behind_count}](#fabd2f) "
behind = "[⇣${count}](#fabd2f) "
conflicted = "[](#fb4934) "
up_to_date = ""
untracked = "[?](#fabd2f) "
modified = "[](#fabd2f) "
stashed = ""
staged = ""
renamed = ""
deleted = ""
